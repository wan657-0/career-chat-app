name: Build EXE

on: 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装打包工具
        run: pip install pyinstaller
      
      - name: 列出文件
        run: ls
      
      - name: 打包 EXE
        run: pyinstaller --onefile --windowed --name "职业规划智能体" 职业规划智能体.py
      
      - name: 检查输出
        run: ls dist/
        if: always()
      
      - name: 上传文件
        uses: actions/upload-artifact@v4
        with:
          name: EXE文件
          path: dist/*.exe
        if: always()
